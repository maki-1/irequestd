<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iRequestD — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1><span>iRequest</span>D</h1>
      <p>Secretary Portal</p>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="dashboard.html">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="dashboard.html?status=pending">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Pending Review
      </a>
      <a class="nav-item" href="dashboard.html?status=approved">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Approved
      </a>
      <a class="nav-item" href="dashboard.html?status=rejected">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Rejected
      </a>
    </nav>
    <div class="sidebar-footer">
      <strong id="adminName">Loading…</strong>
      <span id="adminRole"></span>
      <br>
      <a href="#" id="logoutBtn" style="color:rgba(255,255,255,.5); font-size:12px; margin-top:6px; display:inline-block;">Sign out</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h2>Verification Applications</h2>
      <div class="topbar-right">
        <span style="font-size:13px; color:#6b7280;" id="dateLabel"></span>
      </div>
    </div>

    <div class="content">

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card total">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-label">Pending</div>
          <div class="stat-value" id="statPending">—</div>
        </div>
        <div class="stat-card approved">
          <div class="stat-label">Approved</div>
          <div class="stat-value" id="statApproved">—</div>
        </div>
        <div class="stat-card rejected">
          <div class="stat-label">Rejected</div>
          <div class="stat-value" id="statRejected">—</div>
        </div>
        <div class="stat-card draft">
          <div class="stat-label">Draft</div>
          <div class="stat-value" id="statDraft">—</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-card">
        <div class="table-header">
          <h3>Applications</h3>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <div class="search-box">
              <svg width="14" height="14" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="searchInput" placeholder="Search name, contact…">
            </div>
            <div class="filters" id="filterBtns">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="pending">Pending</button>
              <button class="filter-btn" data-status="approved">Approved</button>
              <button class="filter-btn" data-status="rejected">Rejected</button>
              <button class="filter-btn" data-status="draft">Draft</button>
            </div>
          </div>
        </div>

        <div id="tableBody">
          <div class="loading">Loading applications…</div>
        </div>

        <div class="pagination" id="pagination"></div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /layout -->

<script src="js/api.js"></script>
<script>
  requireAuth();

  document.getElementById('adminName').textContent = getName();
  document.getElementById('adminRole').textContent = getRole().charAt(0).toUpperCase() + getRole().slice(1);
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    clearAuth();
    window.location.href = '/admin/index.html';
  });

  let currentStatus = 'all';
  let currentPage = 1;
  let searchTimer;

  // Pre-select filter from URL
  const urlStatus = new URLSearchParams(location.search).get('status');
  if (urlStatus) {
    currentStatus = urlStatus;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.status === urlStatus);
    });
  }

  // Load stats
  async function loadStats() {
    const res = await apiFetch('/stats');
    if (!res?.ok) return;
    const s = res.data;
    document.getElementById('statTotal').textContent   = s.total;
    document.getElementById('statPending').textContent = s.pending;
    document.getElementById('statApproved').textContent = s.approved;
    document.getElementById('statRejected').textContent = s.rejected;
    document.getElementById('statDraft').textContent   = s.draft;
  }

  // Load applications
  async function loadApplications() {
    document.getElementById('tableBody').innerHTML = '<div class="loading">Loading…</div>';
    const search = document.getElementById('searchInput').value.trim();
    const res = await apiFetch(`/applications?status=${currentStatus}&page=${currentPage}&search=${encodeURIComponent(search)}`);
    if (!res?.ok) {
      document.getElementById('tableBody').innerHTML = '<div class="empty-state"><p>Failed to load applications.</p></div>';
      return;
    }
    const { applications, total, limit } = res.data;
    renderTable(applications);
    renderPagination(total, limit);
  }

  function renderTable(apps) {
    if (!apps.length) {
      document.getElementById('tableBody').innerHTML = `
        <div class="empty-state">
          <p>No applications found.</p>
        </div>`;
      return;
    }

    const rows = apps.map(a => {
      const user = a.user || {};
      const submitted = a.submittedAt ? formatDate(a.submittedAt) : '—';
      const name = a.fullName || user.username || '—';
      return `
        <tr style="cursor:pointer" onclick="location.href='application.html?id=${a._id}'">
          <td>
            <div class="td-name">${name}</div>
            <div class="td-sub">${user.username || ''}</div>
          </td>
          <td>${user.contactNumber || '—'}</td>
          <td>${user.email || '—'}</td>
          <td>${submitted}</td>
          <td>${badgeHtml(a.status)}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); location.href='application.html?id=${a._id}'">
              Review →
            </button>
          </td>
        </tr>`;
    }).join('');

    document.getElementById('tableBody').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Full Name</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Submitted</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderPagination(total, limit) {
    const pages = Math.ceil(total / limit);
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = `<span>${total} total</span>`;
    html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
    for (let i = 1; i <= pages; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>Next ›</button>`;
    document.getElementById('pagination').innerHTML = html;
  }

  function changePage(p) { currentPage = p; loadApplications(); }

  // Filter buttons
  document.getElementById('filterBtns').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    currentPage = 1;
    loadApplications();
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadApplications(); }, 350);
  });

  loadStats();
  loadApplications();
</script>
</body>
</html>
