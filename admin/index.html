<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iRequestD — Secretary Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1><span>iRequest</span>D</h1>
        <p>Secretary / Admin Portal · Dologon, Maramag, Bukidnon</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button class="login-btn" type="submit" id="loginBtn">Sign In</button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:12px; color:#9ca3af;">
        First time? Set up admin account at <code>/api/admin/setup</code>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) window.location.href = '/admin/dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errEl.style.display = 'none';

      const res = await apiFetch('/login', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      if (res?.ok) {
        saveAuth(res.data.token, res.data.name, res.data.role);
        window.location.href = '/admin/dashboard.html';
      } else {
        errEl.textContent = res?.data?.message || 'Invalid credentials';
        errEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
